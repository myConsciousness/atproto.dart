# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/about-dependabot-version-updates
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # --- Dart pub (root workspace) ------------------------------------------
  # This repo is a Dart pub workspace (melos 8). `dart pub get` resolves the
  # whole workspace from the root, so a single "/" entry covers every member
  # package listed under `workspace:` in the root pubspec.yaml.
  #
  # NOTE: Dependabot's `pub` support for pub *workspaces* is relatively new.
  # If Dependabot ever fails to resolve the workspace from the root, the
  # fallback is to switch dependency automation to Renovate, which has
  # stronger monorepo/workspace support. (Comment only — no action here.)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
      time: "12:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    groups:
      pub-dependencies:
        patterns:
          - "*"
    ignore:
      # Codegen toolchain: a MAJOR bump changes the generated `.freezed.dart` /
      # `.g.dart` output, which requires regenerating and committing all sources
      # (Verify Generated will fail otherwise). Keep these updates in human
      # hands; minor/patch updates still flow through.
      - dependency-name: "freezed"
        update-types: ["version-update:semver-major"]
      - dependency-name: "freezed_annotation"
        update-types: ["version-update:semver-major"]
      - dependency-name: "build_runner"
        update-types: ["version-update:semver-major"]
      - dependency-name: "json_serializable"
        update-types: ["version-update:semver-major"]
      - dependency-name: "json_annotation"
        update-types: ["version-update:semver-major"]

  # --- Dart/Flutter pub (bluesky_text_flutter) ----------------------------
  # bluesky_text_flutter is a Flutter package that lives OUTSIDE the Dart pub
  # workspace (it is not listed under `workspace:` in the root pubspec.yaml),
  # so it resolves independently and needs its own Dependabot entry.
  - package-ecosystem: "pub"
    directory: "/packages/bluesky_text_flutter"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
      time: "12:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    groups:
      flutter-dependencies:
        patterns:
          - "*"

  # --- GitHub Actions ------------------------------------------------------
  # Keep `uses:` action versions in .github/workflows/* up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
      time: "12:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"
