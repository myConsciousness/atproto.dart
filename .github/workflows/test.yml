name: Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/*/lib/**"
      - "packages/*/test/**"
      - "packages/*/pubspec.yaml"

jobs:
  tacos:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ matrix.package_path }}

    strategy:
      fail-fast: false
      matrix:
        package_path:
          - packages/at_primitives
          - packages/lexicon
          - packages/xrpc
          - packages/multiformats
          - packages/atproto_core
          - packages/atproto_oauth
          - packages/atproto_test
          - packages/did_plc
          - packages/atproto
          - packages/bluesky
          - packages/bluesky_text
          - packages/bluesky_cli
          - packages/lex_gen

    steps:
      - uses: actions/checkout@v7

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Check format
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze

      - name: Run tests
        run: |
          if test -d "test"; then
            dart test
          fi

  # Flutter packages cannot use `dart pub get` / the Dart-only workspace, so
  # they run in a separate job with the Flutter SDK installed.
  flutter:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ matrix.package_path }}

    strategy:
      fail-fast: false
      matrix:
        package_path:
          - packages/bluesky_text_flutter

    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check format
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: |
          if test -d "test"; then
            flutter test
          fi

      - name: Analyze & test example
        run: |
          if test -d "example"; then
            cd example
            flutter pub get
            flutter analyze
            if test -d "test"; then
              flutter test
            fi
          fi
