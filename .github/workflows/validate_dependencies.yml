name: Validate Dependencies

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/*/pubspec.yaml"

# Cancel superseded runs for the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: validate-dependencies-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-dependencies:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # Installs Dart, restores the pub-cache, and runs a single workspace-wide
      # `dart pub get` at the repo root.
      - uses: ./.github/actions/setup-dart-cached

      - name: Validate Dependencies
        run: dart run ./scripts/validate_dependencies.dart
